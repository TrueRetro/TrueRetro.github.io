<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Retro | Monitor Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@700;800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b1120;
            --dot-color: rgba(255, 255, 255, 0.3); 
            --header-bg: rgba(15, 23, 42, 0.75); 
            --card-bg: #1e293b;
            --desc-bg: rgba(0, 0, 0, 0.4);
            --text-main: #cbd5e1;
            --text-title: #f8fafc;
            --accent: #38bdf8;
            --border-glow: rgba(255, 255, 255, 0.1);
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.45);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --dot-color: rgba(15, 23, 42, 0.15);
            --header-bg: rgba(255, 255, 255, 0.8);
            --card-bg: #ffffff;
            --desc-bg: rgba(255, 255, 255, 0.5);
            --text-main: #475569;
            --text-title: #0f172a;
            --accent: #0284c7;
            --border-glow: rgba(0, 0, 0, 0.08);
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.12);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.4s ease;
            display: flex; flex-direction: column; min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-dots {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 25px 25px; z-index: -1; pointer-events: none;
        }

        /* Frosted Header Styling */
        header {
            background: var(--header-bg); 
            backdrop-filter: blur(20px) saturate(160%);
            border-bottom: 1px solid var(--border-glow); 
            position: sticky; top: 0; z-index: 1000; width: 100%;
        }

        .header-top {
            max-width: 1200px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center; 
            padding: 20px; position: relative;
        }

        header h1 { 
            margin: 0; 
            color: var(--text-title); 
            font-family: 'Google Sans', sans-serif;
            font-weight: 900; 
            font-size: 2.2em; 
            position: absolute; 
            left: 50%; transform: translateX(-50%); 
            letter-spacing: -1.5px; 
        }

        .header-icon {
            display: flex; align-items: center; color: var(--text-title);
            cursor: pointer;
        }

        #theme-toggle {
            background: none; border: none; cursor: pointer; color: var(--text-title); font-size: 1.5em;
        }

        /* Main Content Structure */
        main { 
            padding: 40px 20px; 
            max-width: 1100px; 
            margin: 0 auto; 
            flex: 1; width: 100%; 
            display: flex; flex-direction: column; gap: 20px;
        }

        /* Top Hero Card (Pretendo) */
        .hero-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid var(--border-glow);
            box-shadow: var(--card-shadow);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .hero-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .hero-text h2 {
            font-family: 'Google Sans', sans-serif;
            font-size: 2rem;
            margin: 0;
            color: var(--text-title);
            font-weight: 800;
        }

        .hero-text p {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-top: 10px;
            opacity: 0.9;
        }

        .hero-card img {
            height: 90px;
            width: auto;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.2));
        }

        /* 3-Column Grid Row */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .sub-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 30px;
            border: 1px solid var(--border-glow);
            box-shadow: var(--card-shadow);
            min-height: 180px;
            opacity: 0.5; /* Faded for placeholders */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .sub-card h3 {
            font-family: 'Google Sans', sans-serif;
            margin: 0;
            font-size: 1.3rem;
            color: var(--text-title);
            font-weight: 700;
        }

        .sub-card p {
            color: var(--text-main);
            margin-top: 10px;
            font-size: 0.95rem;
        }

        /* Responsive Layout */
        @media (max-width: 850px) {
            header h1 { font-size: 1.6em; }
            .card-grid { grid-template-columns: 1fr; }
            .hero-card { flex-direction: column; text-align: center; }
            .hero-card img { margin-top: 20px; }
            .header-icon { display: none; } /* Hiding arrow on mobile for space */
        }

        footer { 
            background: var(--header-bg); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid var(--border-glow); 
            padding: 40px 20px; 
            margin-top: 60px;
            text-align: center;
        }
    </style>
</head>
<body>
    <script>(function() { const savedTheme = localStorage.getItem('theme') || 'dark'; document.body.setAttribute('data-theme', savedTheme); })();</script>
    <div class="bg-dots"></div>
    
    <header>
        <div class="header-top">
            <div class="header-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m6 9 6 6 6-6"/>
                </svg>
            </div>
            <h1>True Retro</h1>
            <button id="theme-toggle">☼</button>
        </div>
    </header>

    <main>
        <a href="https://trueretro.github.io/Monitor/Pretendo" class="hero-card">
            <div class="hero-text">
                <h2>Pretendo Network</h2>
                <p>Live health metrics for the Wii U and 3DS revival service.</p>
            </div>
            <img src="Images/pretendo.png" alt="Pretendo Logo">
        </a>

        <div class="card-grid">
            <div class="sub-card">
                <h3>Future Hub</h3>
                <p>Upcoming network tracker slot.</p>
            </div>
            <div class="sub-card">
                <h3>Future Hub</h3>
                <p>Upcoming network tracker slot.</p>
            </div>
            <div class="sub-card">
                <h3>Future Hub</h3>
                <p>Upcoming network tracker slot.</p>
            </div>
        </div>
    </main>

    <footer>
        <div style="font-weight:900; font-size:1.4em; color:var(--text-title); font-family: 'Google Sans', sans-serif;">True Retro</div>
        <div style="font-size:0.85em; opacity:0.6; margin-top:10px;">&copy; 2026 True Retro Monitor Hub</div>
    </footer>

    <script>
        document.getElementById('theme-toggle').onclick = () => {
            const current = document.body.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
        };
    </script>
</body>
</html>
