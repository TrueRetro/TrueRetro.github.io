<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Retro Monitor Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Google Sans", sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Frosted Glass Header */
        header {
            width: 100%;
            height: 100px;
            position: fixed;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            background-color: rgba(255, 255, 255, 0.03); 
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Maximum Boldness for Title */
        .header-title {
            font-size: 2.8rem;
            font-weight: 900; 
            letter-spacing: -1.5px;
        }

        /* Clean Stemless Chevron */
        .header-icon {
            position: absolute;
            left: 50px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
        }

        .header-icon svg {
            width: 100%;
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Layout Container */
        main {
            margin-top: 150px;
            width: 90%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding-bottom: 60px;
        }

        /* The Large "Main" Card Style (Pretendo) */
        .main-card {
            background-color: #0A0A0A;
            border-radius: 35px;
            padding: 45px;
            border: 1px solid #1A1A1A;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .main-card:hover {
            background-color: #111111;
            border-color: #333333;
            transform: scale(1.01);
        }

        .main-card-content h2 {
            font-size: 2.2rem;
            margin: 0;
            font-weight: 700;
        }

        .main-card-content p {
            font-size: 1.2rem;
            color: #888888;
            margin-top: 10px;
        }

        .main-card img {
            height: 100px;
            width: auto;
        }

        /* Grid for the 3 smaller cards */
        .grid-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        /* Small Card Styling */
        .small-card {
            background-color: #0A0A0A;
            border-radius: 30px;
            padding: 30px;
            border: 1px solid #1A1A1A;
            opacity: 0.3; /* Keeping placeholders faded */
            min-height: 200px;
        }

        .small-card h3 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .grid-row { grid-template-columns: 1fr; }
            .main-card { flex-direction: column; text-align: center; }
            .main-card img { margin-top: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-icon">
            <svg viewBox="0 0 24 24">
                <path d="M6 9l6 6 6-6" />
            </svg>
        </div>
        <div class="header-title">True Retro</div>
    </header>

    <main>
        
        <a href="https://trueretro.github.io/Monitor/Pretendo" class="main-card">
            <div class="main-card-content">
                <h2>Pretendo Network</h2>
                <p>Live metrics for the Wii U and 3DS revival servers.</p>
            </div>
            <img src="pretendo.png" alt="Pretendo Logo">
        </a>

        <div class="grid-row">
            <div class="small-card">
                <h3>Future Hub</h3>
                <p>Monitor expansion slot.</p>
            </div>
            <div class="small-card">
                <h3>Future Hub</h3>
                <p>Monitor expansion slot.</p>
            </div>
            <div class="small-card">
                <h3>Future Hub</h3>
                <p>Monitor expansion slot.</p>
            </div>
        </div>

    </main>

</body>
</html>
