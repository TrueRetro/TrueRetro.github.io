<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Retro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Google Sans', sans-serif;
        }

        header {
            position: relative;
            /* High-gloss horizon reflection */
            background: linear-gradient(180deg, #333333 0%, #1a1a1a 49%, #000000 50%, #000000 100%);
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-sizing: border-box;
            border-top: 1.5px solid #555555;
            border-bottom: 1px solid #000000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        /* Glass Shine Overlay */
        header::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.03) 100%);
            pointer-events: none;
        }

        .logo {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            z-index: 1;
            user-select: none;
        }

        nav {
            display: flex;
            align-items: center;
            font-size: 0.82rem;
            color: #ffffff;
            margin-left: 20px;
            z-index: 1;
        }

        .nav-item { padding: 0 4px; cursor: pointer; transition: color 0.2s; }
        .nav-item:hover { color: #bbbbbb; }
        .sep { margin: 0 10px; color: #444444; user-select: none; }

        /* Mode Toggle Section */
        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 1;
            margin-left: auto;
        }

        .toggle-icon {
            fill: #444444; /* Dimmed state */
            transition: all 0.3s ease;
        }

        .icon-snes { width: 32px; height: 16px; }
        .icon-switch2 { width: 28px; height: 14px; }

        /* The Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 18px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #111111;
            border: 1px solid #333;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 2px;
            bottom: 2px;
            background: linear-gradient(180deg, #777 0%, #333 100%);
            border-top: 1px solid #999;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #0a0f1a; border-color: #444; }

        input:checked + .slider:before {
            transform: translateX(20px);
            background: linear-gradient(180deg, #ffffff 0%, #bbbbbb 100%);
        }

        /* Icon Highlight States */
        input:not(:checked) ~ .icon-snes { fill: #ffffff; filter: drop-shadow(0 0 5px rgba(255,255,255,0.4)); }
        input:checked ~ .icon-switch2 { fill: #ffffff; filter: drop-shadow(0 0 5px rgba(255,255,255,0.4)); }

    </style>
</head>
<body>

    <header>
        <div class="logo">True Retro</div>
        
        <nav>
            <span class="sep">|</span>
            <div class="nav-item">Downloads</div><span class="sep">|</span>
            <div class="nav-item">The Mod Pool</div><span class="sep">|</span>
            <div class="nav-item">Nintendo Archives</div><span class="sep">|</span>
            <div class="nav-item">TrueRetroOS</div><span class="sep">|</span>
            <div class="nav-item">TrueRetro3DS</div>
        </nav>

        <div class="mode-toggle">
            <svg class="toggle-icon icon-snes" viewBox="0 0 32 16">
                <rect x="2" y="2" width="28" height="12" rx="6" />
                <circle cx="22" cy="6" r="1.5" opacity="0.5" />
                <circle cx="25" cy="8" r="1.5" opacity="0.5" />
                <circle cx="22" cy="10" r="1.5" opacity="0.5" />
                <circle cx="19" cy="8" r="1.5" opacity="0.5" />
                <rect x="7" y="7" width="4" height="2" rx="0.5" opacity="0.5" />
                <rect x="8" y="6" width="2" height="4" rx="0.5" opacity="0.5" />
            </svg>

            <label class="switch">
                <input type="checkbox" id="mode-switch">
                <span class="slider"></span>
            </label>

            <svg class="toggle-icon icon-switch2" viewBox="0 0 28 14">
                <rect x="1" y="1" width="26" height="12" rx="4" />
                <circle cx="7" cy="7" r="3" opacity="0.5" /> <circle cx="20" cy="5" r="1" opacity="0.5" /> <circle cx="22" cy="7" r="1" opacity="0.5" />
                <circle cx="20" cy="9" r="1" opacity="0.5" />
                <circle cx="18" cy="7" r="1" opacity="0.5" />
            </svg>
        </div>
    </header>

</body>
</html>
