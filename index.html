<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Retro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* White test background */
            font-family: 'Google Sans', sans-serif;
        }

        /* The navy-black header bar from image_ed63df.png */
        header {
            background-color: #050a14; 
            height: 56px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            box-sizing: border-box;
            width: 100%;
        }

        .logo {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 700; /* Bold weight from your opsz link */
            text-transform: uppercase;
            letter-spacing: 0.5px;
            /* Precise Chromatic Aberration matching image_ed63df.png */
            text-shadow: 
                -1.2px 0 rgba(255, 0, 0, 0.9), 
                1.2px 0 rgba(0, 255, 255, 0.9);
            user-select: none;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            width: 22px;
            height: 22px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .hamburger span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: #ffffff;
            border-radius: 1px;
        }

        /* Test wrapper to center the header on the page */
        .test-container {
            padding: 100px 0;
            display: flex;
            justify-content: center;
        }
        
        .header-wrapper {
            width: 100%;
            max-width: 1200px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="test-container">
        <div class="header-wrapper">
            <header>
                <div class="logo">TrueRetro</div>
                
                <button class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </header>
        </div>
    </div>

</body>
</html>
