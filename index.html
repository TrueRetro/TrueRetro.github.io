<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueRetro Header Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Pure white background */
            font-family: 'Google Sans', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 80px; /* Offset from top as seen in screenshot */
        }

        header {
            background-color: #050a14; /* Deep navy-black */
            width: 90%;
            max-width: 1100px;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            box-sizing: border-box;
            /* The specific drop shadow from image_ed5882.png */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border-radius: 2px; /* Very slight rounding seen in design */
        }

        .logo {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            /* Sharp Chromatic Aberration */
            text-shadow: 
                -1.5px 0 rgba(255, 0, 0, 1), 
                1.5px 0 rgba(0, 255, 255, 1);
            user-select: none;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 14px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .hamburger span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: #ffffff;
            border-radius: 1px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TrueRetro</div>
        
        <button class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

</body>
</html>
