<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITLE HERE | True Retro</title>
    
    <link rel="icon" type="image/png" href="https://trueretro.github.io/Images/main_favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@700;800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b1120;
            --dot-color: rgba(255, 255, 255, 0.3); 
            --header-bg: rgba(15, 23, 42, 0.75); 
            --card-bg: #1e293b;
            --text-main: #cbd5e1;
            --text-title: #f8fafc;
            --accent: #38bdf8;
            --border-glow: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --dot-color: rgba(15, 23, 42, 0.15);
            --header-bg: rgba(255, 255, 255, 0.8);
            --card-bg: #ffffff;
            --text-main: #475569;
            --text-title: #0f172a;
            --accent: #0284c7;
            --border-glow: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.4s ease;
            display: flex; flex-direction: column; min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-dots {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 25px 25px; z-index: -1; pointer-events: none;
        }

        header {
            background: var(--header-bg); 
            backdrop-filter: blur(20px) saturate(160%);
            border-bottom: 1px solid var(--border-glow); 
            position: sticky; top: 0; z-index: 1000; width: 100%;
        }

        .header-top {
            max-width: 1200px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center; 
            padding: 20px; position: relative;
        }

        header h1 { 
            margin: 0; color: var(--text-title); 
            font-family: 'Google Sans', sans-serif;
            font-weight: 900; font-size: 1.8em; 
            position: absolute; left: 50%; transform: translateX(-50%); 
            letter-spacing: -1px; 
        }

        .icon-btn { 
            background: none; border: none; cursor: pointer; padding: 0; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--text-title); width: 40px; height: 40px; z-index: 1010; 
        }

        .menu-toggle { flex-direction: column; gap: 6px; }
        .menu-toggle span { 
            display: block; width: 26px; height: 3px; 
            background-color: var(--text-title); border-radius: 4px; transition: 0.4s; 
        }

        /* Hamburger Animation */
        .menu-toggle.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        nav { 
            display: flex; flex-direction: column; align-items: center; 
            width: 100%; max-height: 0; overflow: hidden; opacity: 0; 
            transition: max-height 0.5s ease, opacity 0.3s ease; 
        }
        nav.active { max-height: 600px; opacity: 1; padding-bottom: 20px; }
        
        nav a { 
            font-weight: 600; color: var(--text-main); text-decoration: none; 
            padding: 12px 30px; width: 80%; text-align: center; 
            border-radius: 12px; margin: 4px 0; transition: all 0.2s; 
        }
        nav a:hover { background-color: rgba(56, 189, 248, 0.1); color: var(--accent); }
        nav a.current { background-color: rgba(56, 189, 248, 0.1); color: var(--accent); }

        main { 
            padding: 40px 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
            flex: 1; width: 100%; 
        }

        footer { 
            background: var(--header-bg); 
            border-top: 1px solid var(--border-glow); 
            padding: 50px 20px; text-align: center;
        }

        .footer-links {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin: 20px 0;
        }
        .footer-links a { color: var(--text-main); text-decoration: none; font-size: 0.9em; font-weight: 600; }
        .footer-links a:hover { color: var(--accent); }

        @media (max-width: 900px) {
            header h1 { font-size: 1.4em; }
        }
    </style>
</head>
<body>
    <script>(function() { const savedTheme = localStorage.getItem('theme') || 'dark'; document.body.setAttribute('data-theme', savedTheme); })();</script>
    
    <div class="bg-dots"></div>
    
    <header id="main-header">
        <div class="header-top">
            <button class="icon-btn menu-toggle" id="mobile-menu-btn">
                <span></span><span></span><span></span>
            </button>
            <h1>True Retro</h1>
            <button class="icon-btn" id="theme-toggle" style="font-size: 1.4em;">☼</button>
        </div>

        <nav id="nav-menu">
            <a href="https://trueretro.github.io/index.html">Home</a>
            <a href="https://trueretro.github.io/ModPool/index.html">The Mod Pool</a>
            <a href="https://trueretro.github.io/Monitor/index.html">Monitor</a>
            <a href="https://trueretro.github.io/Archives/index.html">Nintendo Archives</a>
            <a href="https://trueretro.github.io/Projects/index.html">True Retro Projects</a>
            <a href="https://trueretro.github.io/Downloads/index.html">Downloads</a>
            <a href="https://trueretro.github.io/Prices/index.html">Retro Prices</a>
            <a href="https://trueretro.github.io/Repairs/index.html">Repairs</a>
        </nav>
    </header>

    <main>
        </main>

    <footer>
        <div style="font-weight:900; font-size:1.6em; color:var(--text-title); font-family: 'Google Sans', sans-serif; letter-spacing: -1px;">True Retro</div>
        
        <div class="footer-links">
            <a href="https://trueretro.github.io/index.html">Home</a>
            <a href="https://trueretro.github.io/ModPool/index.html">The Mod Pool</a>
            <a href="https://trueretro.github.io/Archives/index.html">Archives</a>
            <a href="https://trueretro.github.io/Monitor/index.html">Monitor</a>
        </div>

        <div style="font-size:0.85em; opacity:0.5; margin-top:20px;">&copy; 2026 True Retro Preservation Hub &bull; v0.1.0</div>
    </footer>

    <script>
        const btn = document.getElementById('mobile-menu-btn');
        const nav = document.getElementById('nav-menu');
        
        btn.onclick = (e) => { 
            e.stopPropagation(); 
            nav.classList.toggle('active'); 
            btn.classList.toggle('active');
        };

        document.getElementById('theme-toggle').onclick = () => {
            const current = document.body.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
        };

        window.onclick = (e) => { 
            if (!e.target.closest('header') && nav.classList.contains('active')) {
                nav.classList.remove('active');
                btn.classList.remove('active');
            } 
        };
    </script>
</body>
</html>
