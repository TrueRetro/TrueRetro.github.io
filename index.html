<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Retro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* White background */
            font-family: 'Google Sans', sans-serif;
        }

        header {
            position: relative;
            /* High-gloss base gradient with "horizon" reflection */
            background: linear-gradient(180deg, #333333 0%, #1a1a1a 49%, #000000 50%, #000000 100%);
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            box-sizing: border-box;
            
            /* Physical edges */
            border-top: 1px solid #555555;
            border-bottom: 1px solid #000000;
            
            /* Deep shadow onto the white page */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        /* The Glass Shine Overlay (Top half) */
        header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.03) 100%);
            pointer-events: none;
        }

        .logo {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-right: 20px;
            z-index: 1;
            white-space: nowrap;
            user-select: none;
        }

        nav {
            display: flex;
            align-items: center;
            font-size: 0.82rem;
            color: #ffffff;
            white-space: nowrap;
            overflow-x: auto; /* Allow scrolling on mobile if too long */
            scrollbar-width: none; /* Hide scrollbar for Firefox */
            z-index: 1;
        }
        
        nav::-webkit-scrollbar { display: none; } /* Hide scrollbar for Chrome/Safari */

        .nav-item {
            display: flex;
            align-items: center;
            padding: 0 4px;
            font-weight: 400;
            letter-spacing: 0.1px;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .nav-item:hover { color: #bbbbbb; }

        .sep {
            margin: 0 10px;
            color: #444444; /* Dark pipe separators */
            font-weight: 400;
            user-select: none;
        }

        main {
            padding: 40px 20px;
            /* Placeholder for content */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">True Retro</div>
        
        <nav>
            <span class="sep">|</span>
            <div class="nav-item">Downloads</div><span class="sep">|</span>
            <div class="nav-item">The Mod Pool</div><span class="sep">|</span>
            <div class="nav-item">Nintendo Archives</div><span class="sep">|</span>
            <div class="nav-item">TrueRetroOS</div><span class="sep">|</span>
            <div class="nav-item">TrueRetro3DS</div><span class="sep">|</span>
            <div class="nav-item">The NintenProject</div><span class="sep">|</span>
            <div class="nav-item">Retro Prices</div><span class="sep">|</span>
            <div class="nav-item">Repairs</div><span class="sep">|</span>
        </nav>
    </header>

    <main>
        </main>

</body>
</html>
