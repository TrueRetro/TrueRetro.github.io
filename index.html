<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Retro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Google Sans', sans-serif;
        }

        header {
            position: relative;
            /* High-gloss "Horizon" Gradient */
            background: linear-gradient(180deg, #333333 0%, #1a1a1a 49%, #000000 50%, #000000 100%);
            width: 100%;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-sizing: border-box;
            border-top: 1.5px solid #555555;
            border-bottom: 1px solid #000000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        /* Glass Shine Overlay */
        header::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.03) 100%);
            pointer-events: none;
        }

        .logo {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            z-index: 1;
            user-select: none;
        }

        nav {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: #ffffff;
            z-index: 1;
        }

        .nav-item { padding: 0 4px; cursor: pointer; transition: color 0.2s; white-space: nowrap; }
        .nav-item:hover { color: #bbbbbb; }
        .sep { margin: 0 10px; color: #444444; user-select: none; }

        /* --- THE TOGGLE SECTION --- */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1;
            margin-left: 20px;
        }

        /* Icons are now White by default */
        .ctrl-icon {
            height: 24px; 
            width: auto;
            fill: #ffffff; 
            transition: all 0.3s ease;
        }

        /* Switch Styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #111111;
            border: 1px solid #333;
            transition: .4s;
            border-radius: 22px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 2px;
            background: linear-gradient(180deg, #888 0%, #333 100%);
            border-top: 1px solid #aaa;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #0a1120; }
        input:checked + .slider:before {
            transform: translateX(20px);
            background: linear-gradient(180deg, #ffffff 0%, #bbbbbb 100%);
        }

        /* Logic: Active icon gets glow, Inactive gets slightly transparent */
        
        /* Classic Active */
        #mode-switch:not(:checked) ~ .icon-snes { 
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        }
        #mode-switch:not(:checked) ~ .icon-joycon { 
            opacity: 0.3;
        }

        /* Modern Active */
        #mode-switch:checked ~ .icon-joycon { 
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        }
        #mode-switch:checked ~ .icon-snes { 
            opacity: 0.3;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">True Retro</div>
        
        <nav>
            <span class="sep">|</span>
            <div class="nav-item">Downloads</div><span class="sep">|</span>
            <div class="nav-item">The Mod Pool</div><span class="sep">|</span>
            <div class="nav-item">Nintendo Archives</div><span class="sep">|</span>
            <div class="nav-item">TrueRetroOS</div><span class="sep">|</span>
            <div class="nav-item">TrueRetro3DS</div>
        </nav>

        <div class="toggle-container">
            <svg class="ctrl-icon icon-snes" viewBox="0 0 40 20">
                <path d="M8,4 h24 c5,0 8,3 8,6 s-3,6 -8,6 h-24 c-5,0 -8,-3 -8,-6 s3,-6 8,-6 Z" fill-opacity="0.1"/>
                <path d="M8,4 a6,6 0 0 0 0,12 h24 a6,6 0 0 0 0,-12 Z" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="28" cy="8" r="1.5" fill="currentColor"/>
                <circle cx="31" cy="11" r="1.5" fill="currentColor"/>
                <circle cx="28" cy="14" r="1.5" fill="currentColor"/>
                <circle cx="25" cy="11" r="1.5" fill="currentColor"/>
                <path d="M7,10 h4 M9,8 v4" stroke="currentColor" stroke-width="1.5"/>
            </svg>

            <label class="switch">
                <input type="checkbox" id="mode-switch">
                <span class="slider"></span>
            </label>

            <svg class="ctrl-icon icon-joycon" viewBox="0 0 40 20">
                <rect x="5" y="4" width="30" height="12" rx="4" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="12" cy="10" r="3.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
                <circle cx="12" cy="10" r="1" fill="currentColor"/>
                <circle cx="28" cy="7" r="1.2" fill="currentColor"/>
                <circle cx="31" cy="10" r="1.2" fill="currentColor"/>
                <circle cx="28" cy="13" r="1.2" fill="currentColor"/>
                <circle cx="25" cy="10" r="1.2" fill="currentColor"/>
            </svg>
        </div>
    </header>

</body>
</html>
