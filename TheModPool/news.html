<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | The Mod Pool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b1120;
            --dot-color: rgba(255, 255, 255, 0.3); 
            --header-bg: rgba(15, 23, 42, 0.75); 
            --text-main: #cbd5e1;
            --text-title: #f8fafc;
            --accent: #38bdf8;
            --border-glow: rgba(255, 255, 255, 0.1);
        }
        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --dot-color: rgba(15, 23, 42, 0.15);
            --header-bg: rgba(255, 255, 255, 0.8);
            --text-main: #475569;
            --text-title: #0f172a;
            --accent: #0284c7;
            --border-glow: rgba(0, 0, 0, 0.08);
        }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.4s ease;
            display: flex; flex-direction: column; min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-dots {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 25px 25px; z-index: -1; pointer-events: none;
        }
        header { background: var(--header-bg); backdrop-filter: blur(20px) saturate(160%); border-bottom: 1px solid var(--border-glow); position: sticky; top: 0; z-index: 1000; width: 100%; }
        .header-top { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 20px; position: relative; }
        header h1 { margin: 0; color: var(--text-title); font-weight: 900; font-size: 1.6em; position: absolute; left: 50%; transform: translateX(-50%); letter-spacing: -0.5px; }
        .icon-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; color: var(--text-title); width: 40px; height: 40px; z-index: 1010; position: relative; }
        .menu-toggle { flex-direction: column; gap: 6px; }
        .menu-toggle span { display: block; width: 26px; height: 3px; background-color: var(--text-title); border-radius: 4px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .menu-toggle.open span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .menu-toggle.open span:nth-child(2) { opacity: 0; transform: translateX(-10px); }
        .menu-toggle.open span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }
        #theme-toggle svg { position: absolute; transition: transform 0.5s, opacity 0.5s; }
        body[data-theme="dark"] #sun-icon { opacity: 1; transform: scale(1); }
        body[data-theme="dark"] #moon-icon { opacity: 0; transform: scale(0); }
        body[data-theme="light"] #sun-icon { opacity: 0; transform: scale(0); }
        body[data-theme="light"] #moon-icon { opacity: 1; transform: scale(1); }
        nav { display: flex; flex-direction: column; align-items: center; width: 100%; max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; }
        nav.active { max-height: 450px; opacity: 1; padding-bottom: 20px; }
        nav a { font-weight: 600; color: var(--text-main); text-decoration: none; padding: 15px 30px; width: 80%; text-align: center; border-radius: 12px; margin: 5px 0; transition: background 0.2s; }
        nav a.current { background-color: rgba(56, 189, 248, 0.1); color: var(--accent); }

        main { padding: 40px 20px; max-width: 1200px; margin: 0 auto; flex: 1; width: 100%; box-sizing: border-box; }
        footer { background: var(--header-bg); backdrop-filter: blur(20px); border-top: 1px solid var(--border-glow); padding: 45px 20px; margin-top: 60px; }
        .footer-content { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
        .footer-logo { color: var(--text-title); font-weight: 900; font-size: 1.4em; letter-spacing: -0.5px; }
        .footer-nav-group, .footer-secondary-group { display: flex; gap: 15px; flex-wrap: nowrap; justify-content: center; }
        .footer-nav-group a, .footer-secondary-group a { color: var(--text-main); text-decoration: none; font-weight: 600; transition: color 0.2s; white-space: nowrap; font-size: 0.85em; }
        .footer-nav-group a:hover, .footer-secondary-group a:hover { color: var(--accent); }
        .footer-bottom { font-size: 0.85em; opacity: 0.6; display: flex; gap: 15px; margin-top: 10px; }
    </style>
</head>
<body>
    <script>
        (function() { const savedTheme = localStorage.getItem('theme') || 'dark'; document.body.setAttribute('data-theme', savedTheme); })();
    </script>
    <div class="bg-dots"></div>
    <header id="main-header">
        <div class="header-top">
            <button class="icon-btn menu-toggle" id="mobile-menu-btn" aria-label="Menu"><span></span><span></span><span></span></button>
            <h1>The Mod Pool</h1>
            <button class="icon-btn" id="theme-toggle" aria-label="Toggle Theme">
                <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
        </div>
        <nav id="nav-menu">
            <a href="index.html">Home</a>
            <a href="hardware.html">Hardware</a>
            <a href="software.html">Software</a>
            <a href="community.html">Community</a>
            <a href="news.html" class="current">News</a>
            <a href="settings.html">Settings</a>
        </nav>
    </header>
    <main></main>
    <footer>
        <div class="footer-content">
            <div class="footer-logo">The Mod Pool</div>
            <div class="footer-nav-group">
                <a href="index.html">Home</a>
                <a href="hardware.html">Hardware</a>
                <a href="software.html">Software</a>
                <a href="community.html">Community</a>
            </div>
            <div class="footer-secondary-group">
                <a href="news.html">News</a>
                <a href="https://github.com/TheModPool" target="_blank">GitHub</a>
            </div>
            <div class="footer-bottom"><span>&copy; 2026 The Mod Pool.</span><span>v2.0.0</span></div>
        </div>
    </footer>
    <script>
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        menuBtn.addEventListener('click', (e) => { e.stopPropagation(); menuBtn.classList.toggle('open'); navMenu.classList.toggle('active'); });
        themeToggle.addEventListener('click', (e) => { e.stopPropagation(); const currentTheme = body.getAttribute('data-theme'); const newTheme = currentTheme === 'dark' ? 'light' : 'dark'; body.setAttribute('data-theme', newTheme); localStorage.setItem('theme', newTheme); });
        window.addEventListener('click', (e) => { if (navMenu.classList.contains('active')) { if (!document.getElementById('main-header').contains(e.target)) { menuBtn.classList.remove('open'); navMenu.classList.remove('active'); } } });
    </script>
</body>
</html>
